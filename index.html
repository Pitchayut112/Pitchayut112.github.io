<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จองคิวไลฟ์สด</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span> LIVE BOOKING</div>
  <div class="topbar-right" id="topbarRight"></div>
</div>

<div class="wrap">
  <div class="page-head">
    <h1>ตารางจองคิวไลฟ์สด</h1>
    <p>เลือกวันที่ว่างเพื่อจองคิว — แต่ละวันจองได้เพียง 1 คิวเท่านั้น</p>
  </div>

  <div id="toast" class="msg hidden"></div>

  <div class="month-nav">
    <div class="label" id="monthLabel">—</div>
    <div class="nav-btns">
      <button id="prevMonthBtn" aria-label="เดือนก่อนหน้า">‹</button>
      <button id="nextMonthBtn" aria-label="เดือนถัดไป">›</button>
    </div>
  </div>

  <div class="weekday-row">
    <span>อา</span><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span>ส</span>
  </div>

  <div class="cal-grid" id="calGrid"></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-swatch" style="background:var(--free-dim);border:1px solid var(--free)"></span> วันว่าง (กดเพื่อจอง)</div>
    <div class="legend-item"><span class="legend-swatch" style="background:rgba(107,114,128,0.18);border:1px solid var(--booked-blur)"></span> ถูกจองแล้ว</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--accent-dim);border:1px solid var(--accent)"></span> คิวของฉัน</div>
  </div>

  <footer class="foot">ระบบจองคิวไลฟ์สด · จัดการโดยแอดมิน</footer>
</div>

<!-- Login Modal -->
<div class="modal-backdrop hidden" id="loginModal">
  <div class="modal">
    <h3>เข้าสู่ระบบลูกค้า</h3>
    <div id="loginError" class="msg err hidden"></div>
    <div class="field">
      <label for="loginUsername">ชื่อผู้ใช้</label>
      <input type="text" id="loginUsername" autocomplete="username">
    </div>
    <div class="field">
      <label for="loginPassword">รหัสผ่าน</label>
      <input type="password" id="loginPassword" autocomplete="current-password">
    </div>
    <div class="modal-actions">
      <button class="btn secondary" id="loginCancelBtn">ยกเลิก</button>
      <button class="btn" id="loginSubmitBtn">เข้าสู่ระบบ</button>
    </div>
  </div>
</div>

<!-- Confirm Booking Modal -->
<div class="modal-backdrop hidden" id="confirmModal">
  <div class="modal">
    <h3>ยืนยันการจองคิว</h3>
    <p style="color:var(--text-dim);font-size:14px;margin-top:-8px">
      วันที่ <strong id="confirmDateLabel" style="color:var(--text)"></strong>
    </p>
    <div class="field">
      <label for="bookingNote">หมายเหตุ (ไม่บังคับ)</label>
      <textarea id="bookingNote" rows="3" placeholder="เช่น ไลฟ์ขายสินค้า A ช่วงเย็น"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" id="confirmCancelBtn">ยกเลิก</button>
      <button class="btn" id="confirmBookBtn">ยืนยันการจอง</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
